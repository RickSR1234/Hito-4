<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Asistente de Soporte Técnico</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',sans-serif;background:#0f1117;color:#e2e8f0;
  height:100vh;display:flex;
  flex-direction:column}
  header{background:#1a1d27;
    border-bottom:1px solid #2d3148;
    padding:14px 24px;
    display:flex;
    align-items:center;
    gap:12px}
  .logo{font-size:1.2rem;font-weight:700;color:#7c83fd}
  .sub{font-size:0.78rem;color:#64748b}
  .badge{margin-left:auto;font-size:0.72rem;background:#1e293b;border:1px solid #334155;padding:3px 10px;border-radius:999px;color:#94a3b8}
  .container{display:flex;flex:1;overflow:hidden}
  .sidebar{width:260px;background:#1a1d27;border-right:1px solid #2d3148;padding:14px;display:flex;flex-direction:column;gap:14px;overflow-y:auto}
  .sidebar h3{font-size:0.7rem;text-transform:uppercase;letter-spacing:.1em;color:#64748b;margin-bottom:4px}
  .session-input{width:100%;background:#0f1117;border:1px solid #2d3148;color:#e2e8f0;padding:7px 10px;border-radius:6px;font-size:0.82rem}
  .qbtn{display:block;width:100%;text-align:left;background:#1e293b;border:1px solid #2d3148;color:#94a3b8;padding:8px 10px;border-radius:6px;font-size:0.8rem;cursor:pointer;margin-bottom:5px;transition:all .15s}
  .qbtn:hover{background:#2d3148;color:#e2e8f0}
  .status-box{background:#0f1117;border:1px solid #2d3148;border-radius:6px;padding:10px;font-size:0.78rem}
  .srow{display:flex;justify-content:space-between;margin-bottom:4px}
  .ok{color:#4ade80}.err{color:#f87171}
  .abtn{display:block;width:100%;text-align:left;background:#1e293b;border:1px solid #2d3148;color:#94a3b8;padding:7px 10px;border-radius:6px;font-size:0.78rem;cursor:pointer;margin-top:5px}
  .abtn:hover{background:#2d3148;color:#e2e8f0}
  .chat{flex:1;display:flex;flex-direction:column;overflow:hidden}
  .messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:14px}
  .msg{max-width:82%;line-height:1.6;font-size:0.88rem}
  .msg.user{align-self:flex-end;background:#7c83fd;color:#fff;padding:10px 14px;border-radius:14px 14px 4px 14px}
  .msg.bot{align-self:flex-start;background:#1a1d27;border:1px solid #2d3148;padding:12px 16px;border-radius:14px 14px 14px 4px;max-width:88%}
  .msg.bot pre{background:#0f1117;border:1px solid #2d3148;padding:8px 10px;border-radius:6px;overflow-x:auto;margin:8px 0;font-size:0.8rem}
  .msg.bot code{font-family:'Courier New',monospace}
  .typing{align-self:flex-start;color:#64748b;font-size:0.8rem;padding:8px;display:none}
  .input-area{background:#1a1d27;border-top:1px solid #2d3148;padding:14px 18px;display:flex;gap:10px}
  textarea{flex:1;background:#0f1117;border:1px solid #2d3148;color:#e2e8f0;padding:10px 14px;border-radius:8px;font-size:0.88rem;resize:none;outline:none;font-family:inherit}
  textarea:focus{border-color:#7c83fd}
  .send{background:#7c83fd;color:#fff;border:none;padding:10px 20px;border-radius:8px;font-size:0.88rem;font-weight:600;cursor:pointer}
  .send:hover{background:#6366f1}
  .send:disabled{background:#334155;cursor:not-allowed}
  .empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#475569;gap:8px}
  .empty .icon{font-size:2rem}
</style>
</head>
<body>
<header>
  <div><div class="logo">⚙️ Asistente de Soporte Técnico</div><div class="sub">RAG · LangChain · Ollama · ChromaDB · Redis</div></div>
  <div class="badge" id="modelBadge">llama3.2</div>
</header>
<div class="container">
  <div class="sidebar">
    <div><h3>Sesión</h3><input class="session-input" id="sid" value="soporte:usuario1"/></div>
    <div>
      <h3>Consultas de ejemplo</h3>
      <button class="qbtn" onclick="setQ('¿Cómo crear una imagen Docker?')">🐳 Crear imagen Docker</button>
      <button class="qbtn" onclick="setQ('¿Cómo actualizar un repositorio Git?')">📦 Actualizar repo Git</button>
      <button class="qbtn" onclick="setQ('¿Cómo visualizar procesos en Linux?')">🐧 Ver procesos Linux</button>
      <button class="qbtn" onclick="setQ('¿Cómo abrir un ticket de soporte?')">🎫 Abrir ticket</button>
      <button class="qbtn" onclick="setQ('¿Cuánto cuesta Windows 11?')">❓ Fuera de contexto</button>
    </div>
    <div>
      <h3>Estado del sistema</h3>
      <div class="status-box">
        <div class="srow"><span>Redis</span><span id="st-r">—</span></div>
        <div class="srow"><span>ChromaDB</span><span id="st-c">—</span></div>
        <div class="srow"><span>Ollama</span><span id="st-o">—</span></div>
        <div class="srow"><span>Fragmentos</span><span id="st-f">—</span></div>
      </div>
      <button class="abtn" onclick="checkHealth()">🔄 Actualizar estado</button>
      <button class="abtn" onclick="reindex()">📚 Reindexar corpus</button>
    </div>
  </div>
  <div class="chat">
    <div class="messages" id="msgs">
      <div class="empty" id="empty"><div class="icon">💬</div><p>Haz una pregunta técnica para comenzar</p></div>
    </div>
    <div class="typing" id="typing">⏳ Consultando documentación...</div>
    <div class="input-area">
      <textarea id="q" rows="2" placeholder="Escribe tu consulta técnica..."></textarea>
      <button class="send" id="sendBtn" onclick="send()">Enviar</button>
    </div>
  </div>
</div>
<script>
const API='http://localhost:8000';

async function checkHealth(){
  try{
    const r=await fetch(`${API}/health/ready`);
    const d=await r.json();
    const c=d.checks||{};
    document.getElementById('st-r').innerHTML=c.redis?'<span class="ok">✓</span>':'<span class="err">✗</span>';
    document.getElementById('st-c').innerHTML=c.chroma?'<span class="ok">✓</span>':'<span class="err">✗</span>';
    document.getElementById('st-o').innerHTML=c.ollama?'<span class="ok">✓</span>':'<span class="err">✗</span>';
    document.getElementById('st-f').textContent=c.chroma_chunks??'—';
    if(c.ollama_models?.length) document.getElementById('modelBadge').textContent=c.ollama_models[0];
  }catch(e){
    document.getElementById('st-r').innerHTML='<span class="err">sin conexión</span>';
    document.getElementById('st-c').innerHTML='<span class="err">sin conexión</span>';
    document.getElementById('st-o').innerHTML='<span class="err">sin conexión</span>';
  }
}

async function reindex(){
  try{
    const r=await fetch(`${API}/admin/reindex`,{method:'POST'});
    const d=await r.json();
    alert('Reindexado: '+d.chunks_indexados+' fragmentos');
    checkHealth();
  }catch(e){alert('Error: '+e.message)}
}

function setQ(t){document.getElementById('q').value=t;document.getElementById('q').focus()}

function fmt(t){
  return t.replace(/```(\w*)\n?([\s\S]*?)```/g,(_,l,c)=>`<pre><code>${c.trim().replace(/</g,'&lt;').replace(/>/g,'&gt;')}</code></pre>`)
          .replace(/`([^`]+)`/g,'<code>$1</code>')
          .replace(/\n/g,'<br>');
}

async function send(){
  const input=document.getElementById('q');
  const sid=document.getElementById('sid').value.trim()||'default';
  const consulta=input.value.trim();
  if(!consulta)return;
  document.getElementById('empty')?.remove();
  addMsg(consulta,'user');
  input.value='';
  const btn=document.getElementById('sendBtn');
  const typing=document.getElementById('typing');
  btn.disabled=true;
  typing.style.display='block';
  try{
    const r=await fetch(`${API}/soporte/consultar`,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({consulta,session_id:sid})
    });
    const d=await r.json();
    if(!r.ok)throw new Error(d.detail||'Error');
    addBotMsg(d.respuesta,d.fuentes||[]);
  }catch(e){addMsg('Error: '+e.message,'bot')}
  finally{btn.disabled=false;typing.style.display='none'}
}

function addMsg(t,role){
  const d=document.createElement('div');
  d.className='msg '+role;
  d.textContent=t;
  document.getElementById('msgs').appendChild(d);
  d.scrollIntoView({behavior:'smooth'});
}

function addBotMsg(t,fuentes){
  const d=document.createElement('div');
  d.className='msg bot';
  d.innerHTML=fmt(t);
  if(fuentes.length){
    const s=document.createElement('div');
    s.style='margin-top:8px;padding-top:6px;border-top:1px solid #2d3148;font-size:0.75rem;color:#64748b';
    s.innerHTML='📄 Fuentes: '+fuentes.map(f=>`<span style="background:#0f1117;border:1px solid #2d3148;padding:2px 8px;border-radius:999px;margin:0 3px;color:#7c83fd">${f.split('/').pop()}</span>`).join('');
    d.appendChild(s);
  }
  document.getElementById('msgs').appendChild(d);
  d.scrollIntoView({behavior:'smooth'});
}

document.getElementById('q').addEventListener('keydown',e=>{
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send()}
});

checkHealth();
</script>
</body>
</html>
